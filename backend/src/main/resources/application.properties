# Server port for the Spring Boot application (React uses 5173, Spring will use 8080)
server.port=8080

# MongoDB Connection Configuration
# We connect to the local default MongoDB port (27017) and use the 'itams_db' database.
spring.data.mongodb.uri=mongodb://localhost:27017/itams_db

# Enable debug logging for Mongo so we can see queries if needed
# logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
